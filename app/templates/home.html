{% extends "base.html" %}

{% block content %}

<h1>All Shops</h1>
{% if shops %}
    {% for shop in shops %}
    <div style="border:1px solid black; padding:10px; margin:10px; border-radius:8px;">
       <h3>{{ shop.shop_name  }}</h3>

       <a href="/shop/{{ shop.slug }}"><button>Visit Shop</button></a>
    </div>
    {% endfor %}
{% else %}
<p>No shops found</p>
{% endif %}

{% endblock %}

{% extends "base.html" %}

{% block title %}Create Account — ShopLocal{% endblock %}

{% block content %}

<div class="container" style="padding:64px 24px;display:flex;justify-content:center;">
    <div class="card" style="width:100%;max-width:440px;">
        
        <div style="text-align:center;margin-bottom:32px;">
            <h1 style="font-size:24px;margin-bottom:8px;">Create Account</h1>
            <p style="margin:0;">Join the ShopLocal marketplace</p>
        </div>

        <form action="/auth/register" method="POST">
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;padding:12px;font-size:16px;">Create Account</button>
        </form>

        <div style="text-align:center;margin-top:24px;font-size:14px;color:var(--color-text-secondary);border-top:1px solid var(--color-border);padding-top:24px;">
            Already have an account? <a href="/login" style="font-weight:600;color:var(--color-text-primary);text-decoration:underline;">Sign in</a>
        </div>
    </div>
</div>

{% endblock %}

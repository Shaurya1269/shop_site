{% extends "base.html" %}

{% block title %}Login — ShopLocal{% endblock %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">🛍️</div>
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Sign in to your ShopLocal account</p>
        </div>

        <form action="/auth/login" method="POST">

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:4px;">
                Sign In →
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account?
            <a href="/register" class="text-accent" style="font-weight:600;">Create one free</a>
        </div>
    </div>
</div>

{% endblock %}

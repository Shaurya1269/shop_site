{% extends "base.html" %}

{% block title %}Sign In — ShopLocal{% endblock %}

{% block content %}

<div class="container" style="padding:64px 24px;display:flex;justify-content:center;">
    <div class="card" style="width:100%;max-width:440px;">
        
        <div style="text-align:center;margin-bottom:32px;">
            <h1 style="font-size:24px;margin-bottom:8px;">Welcome Back</h1>
            <p style="margin:0;">Sign in to your ShopLocal account</p>
        </div>

        <form action="/auth/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;padding:12px;font-size:16px;">Sign In</button>
        </form>

        <div style="text-align:center;margin-top:24px;font-size:14px;color:var(--color-text-secondary);border-top:1px solid var(--color-border);padding-top:24px;">
            Don't have an account? <a href="/register" style="font-weight:600;color:var(--color-text-primary);text-decoration:underline;">Create one now</a>
        </div>
    </div>
</div>

{% endblock %}

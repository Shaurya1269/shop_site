{% extends "base.html" %}

{% block title %}Add Product — ShopLocal{% endblock %}

{% block content %}

<div class="container" style="padding:64px 24px;display:flex;justify-content:center;">
    <div style="width:100%;max-width:560px;">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h1 style="font-size:24px;margin:0;">Add Product</h1>
            <a href="/dashboard" class="btn btn-outline" style="padding:6px 12px;font-size:14px;">Back to Dashboard</a>
        </div>

        <div class="card">
            <form method="POST" enctype="multipart/form-data">

                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter product name" required>
                </div>

                <div class="form-group">
                    <label for="price">Price (&#8377;)</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" placeholder="Describe your product..."></textarea>
                </div>

                <div class="form-group">
                    <label for="stock">Stock Quantity</label>
                    <input type="number" id="stock" name="stock" min="0" value="0" required>
                </div>

                <div class="form-group">
                    <label>Product Image</label>
                    <div style="border:1px dashed var(--color-border);padding:24px;text-align:center;border-radius:var(--radius-sm);background:var(--color-bg-section);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 8px;color:var(--color-text-secondary);">
                            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
                        </svg>
                        <p style="font-size:14px;color:var(--color-text-secondary);margin-bottom:8px;">Upload a product photo</p>
                        <input type="file" name="image" accept="image/*" style="width:100%;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;padding:12px;">
                    Add Product
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}

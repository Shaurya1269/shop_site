{% extends "base.html" %}

{% block title %}Add Product — ShopLocal{% endblock %}

{% block content %}

<div class="auth-wrapper" style="align-items:flex-start;padding-top:40px;">
    <div style="width:100%;max-width:560px;margin:0 auto;">

        <div class="page-title-bar" style="margin-bottom:24px;">
            <h1 class="page-title">➕ Add Product</h1>
            <a href="/dashboard" class="btn btn-secondary btn-sm">← Dashboard</a>
        </div>

        <div class="form-card">
            <form method="POST" enctype="multipart/form-data">

                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Handmade Chocolate Cake" required>
                </div>

                <div class="form-group">
                    <label for="price">Price (₹)</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" placeholder="Describe your product…"></textarea>
                </div>

                <div class="form-group">
                    <label for="stock">Stock Quantity</label>
                    <input type="number" id="stock" name="stock" min="0" value="0" required>
                </div>

                <div class="form-group">
                    <label>Product Image</label>
                    <div class="file-upload-zone">
                        <p style="font-size:13px;color:var(--color-text-muted);margin-bottom:8px;">📷 Upload a product photo</p>
                        <input type="file" name="image" accept="image/*">
                        <p style="font-size:11px;color:var(--color-text-light);margin-top:8px;margin-bottom:0;">JPEG, PNG, WEBP — Max 5MB</p>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">
                    ✅ Add Product
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}

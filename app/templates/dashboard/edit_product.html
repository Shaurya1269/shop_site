{% extends "base.html" %}

{% block title %}Edit Product — ShopLocal{% endblock %}

{% block content %}

<div class="container" style="padding:64px 24px;display:flex;justify-content:center;">
    <div style="width:100%;max-width:560px;">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h1 style="font-size:24px;margin:0;">Edit Product</h1>
            <a href="/dashboard" class="btn btn-outline" style="padding:6px 12px;font-size:14px;">Back to Dashboard</a>
        </div>

        <div class="card">
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" value="{{ product.name }}" required>
                </div>

                <div class="form-group">
                    <label for="price">Price (&#8377;)</label>
                    <input type="number" id="price" step="0.01" name="price" value="{{ product.price }}" min="0" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3">{{ product.description }}</textarea>
                </div>

                <div class="form-group">
                    <label for="stock">Stock Quantity</label>
                    <input type="number" id="stock" name="stock" value="{{ product.stock }}" min="0" required>
                </div>

                {% if product.image_url %}
                <div class="form-group">
                    <label>Current Image</label>
                    <div style="border-radius:var(--radius-sm);overflow:hidden;max-width:160px;border:1px solid var(--color-border);">
                        <img src="{{ product.image_url }}" alt="{{ product.name }}" style="width:100%;display:block;">
                    </div>
                </div>
                {% endif %}

                <div class="form-group">
                    <label>Replace Image <span style="font-weight:400;color:var(--color-text-secondary);font-size:12px;">(optional)</span></label>
                    <div style="border:1px dashed var(--color-border);padding:24px;text-align:center;border-radius:var(--radius-sm);background:var(--color-bg-section);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 8px;color:var(--color-text-secondary);">
                            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
                        </svg>
                        <p style="font-size:14px;color:var(--color-text-secondary);margin-bottom:8px;">Upload a new photo</p>
                        <input type="file" name="image" accept="image/*" style="width:100%;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;padding:12px;">
                    Save Changes
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}Edit Product — ShopLocal{% endblock %}

{% block content %}

<div class="auth-wrapper" style="align-items:flex-start;padding-top:40px;">
    <div style="width:100%;max-width:560px;margin:0 auto;">

        <div class="page-title-bar" style="margin-bottom:24px;">
            <h1 class="page-title">✏️ Edit Product</h1>
            <a href="/dashboard" class="btn btn-secondary btn-sm">← Dashboard</a>
        </div>

        <div class="form-card">
            <form method="POST" enctype="multipart/form-data">

                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" value="{{ product.name }}" required>
                </div>

                <div class="form-group">
                    <label for="price">Price (₹)</label>
                    <input type="number" id="price" step="0.01" name="price" value="{{ product.price }}" min="0" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3">{{ product.description }}</textarea>
                </div>

                <div class="form-group">
                    <label for="stock">Stock Quantity</label>
                    <input type="number" id="stock" name="stock" value="{{ product.stock }}" min="0" required>
                </div>

                {% if product.image_url %}
                <div class="form-group">
                    <label>Current Image</label>
                    <div style="border-radius:var(--radius-md);overflow:hidden;max-width:180px;border:1.5px solid var(--color-border);">
                        <img src="{{ product.image_url }}" alt="{{ product.name }}" style="width:100%;display:block;">
                    </div>
                </div>
                {% endif %}

                <div class="form-group">
                    <label>Replace Image <span class="text-muted text-sm">(leave empty to keep current)</span></label>
                    <div class="file-upload-zone">
                        <p style="font-size:13px;color:var(--color-text-muted);margin-bottom:8px;">📷 Upload a new photo</p>
                        <input type="file" name="image" accept="image/*">
                        <p style="font-size:11px;color:var(--color-text-light);margin-top:8px;margin-bottom:0;">JPEG, PNG, WEBP — Max 5MB</p>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">
                    💾 Save Changes
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}Create Shop — ShopLocal{% endblock %}

{% block content %}

<div class="container" style="padding:64px 24px;display:flex;justify-content:center;">
    <div style="width:100%;max-width:560px;">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h1 style="font-size:24px;margin:0;">Create your shop</h1>
            <a href="/dashboard" class="btn btn-outline" style="padding:6px 12px;font-size:14px;">Back to Dashboard</a>
        </div>

        <div class="card">
            <form action="/create-shop" method="POST">
                
                <div class="form-group" style="margin-bottom:16px;">
                    <label for="shop_name">Shop Name</label>
                    <input type="text" id="shop_name" name="shop_name" placeholder="Enter your business name" required class="form-control" style="width:100%;padding:10px;margin-top:8px;">
                </div>

                <div class="form-group" style="margin-bottom:16px;">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category" placeholder="e.g. Clothing, Electronics" class="form-control" style="width:100%;padding:10px;margin-top:8px;">
                </div>

                <div class="form-group" style="margin-bottom:16px;">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="What does your shop sell?" rows="3" class="form-control" style="width:100%;padding:10px;margin-top:8px;"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top:16px;padding:12px;">
                    Create
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
